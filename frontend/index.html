<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Lock zoom so the app feels native on phones (no pinch/double-tap zoom,
         no input-focus auto-zoom). viewport-fit=cover for safe-area insets. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>OpsFlow — HR Operations</title>
    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("opsflow_theme") || "system";
          var dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
      // Block iOS Safari pinch-zoom gestures (it ignores user-scalable=no) and
      // double-tap zoom, so the app behaves like a native shell.
      (function () {
        var stop = function (e) {
          e.preventDefault();
        };
        document.addEventListener("gesturestart", stop, { passive: false });
        document.addEventListener("gesturechange", stop, { passive: false });
        var last = 0;
        document.addEventListener(
          "touchend",
          function (e) {
            var now = Date.now();
            if (now - last <= 300) e.preventDefault();
            last = now;
          },
          { passive: false },
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
